<!DOCTYPE html>
<html>
<head>
  <title>Dojiye Store</title>
  <style>
    body { font-family: Arial; margin: 0; }
    header { background: #111; color: #fff; padding: 15px; }
    nav a { color: white; margin: 10px; text-decoration: none; }
    .container { padding: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; }
    button { padding: 8px 15px; background: green; color: white; border: none; }
  </style>
</head>
<body>

<header>
  <h1>Dojiye Store</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#dashboard">Dashboard</a>
  </nav>
</header>

<div class="container" id="home">
  <h2>Welcome</h2>
  <p>Ka dalbo alaab kasta</p>
</div>

<div class="container" id="products">
  <h2>Products</h2>

  <div class="product">
    <p>Nesquik - $5</p>
    <button onclick="order('Nesquik',5)">Dalbo</button>
  </div>

  <div class="product">
    <p>Biscuits - $3</p>
    <button onclick="order('Biscuits',3)">Dalbo</button>
  </div>

</div>

<div class="container" id="dashboard">
  <h2>Orders</h2>
  <ul id="orders"></ul>
</div>

<script>
let orders = JSON.parse(localStorage.getItem('orders')) || [];

function save(){
  localStorage.setItem('orders', JSON.stringify(orders));
}

function order(product,price){
  let name = prompt('Magacaaga geli');
  let phone = prompt('Lambarkaaga geli');

  let orderData = {product,price,name,phone};
  orders.push(orderData);
  save();
  showOrders();

  let msg = `Dalab:%0A${product}%0A$${price}%0A${name}%0A${phone}`;
  window.open(`https://wa.me/251933572122?text=${msg}`);
}

function showOrders(){
  let list = document.getElementById('orders');
  list.innerHTML = '';
  orders.forEach(o=>{
    let li = document.createElement('li');
    li.textContent = o.product + ' - $' + o.price + ' - ' + o.name;
    list.appendChild(li);
  });
}

showOrders();
</script>

</body>
</html>
