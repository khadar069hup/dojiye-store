<!DOCTYPE html>
<html>
<head>
  <title>Dojiye Store ULTRA</title>
  <style>
    body { font-family: Arial; margin: 0; background:#f5f5f5; }
    header { background: #111; color: #fff; padding: 15px; }
    nav a { color: white; margin: 10px; text-decoration: none; }
    .container { padding: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; background:white; }
    button { padding: 8px 15px; background: green; color: white; border: none; cursor:pointer; }
    input { padding: 8px; margin:5px; }
    .hidden { display:none; }
    .cart { background:#fff; padding:10px; margin:10px 0; }
  </style>
</head>
<body>

<header>
  <h1>Dojiye Store ULTRA</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#cart">Cart</a>
    <a href="#admin">Admin</a>
  </nav>
</header>

<div class="container" id="home">
  <h2>Welcome</h2>
  <p>Online Shopping Jijiga</p>
  <p>📞 Call: <a href="tel:+251933572122">+251933572122</a></p>
  <p>WhatsApp 🇪🇹: <a href="https://wa.me/251933572122">Chat</a></p>
  <p>WhatsApp 🇸🇴: <a href="https://wa.me/252636896908">Chat</a></p>
</div>

<div class="container" id="products">
  <h2>Products</h2>
  <div id="productList"></div>
</div>

<div class="container" id="cart">
  <h2>Cart</h2>
  <div id="cartList" class="cart"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<div class="container" id="admin">
  <h2>Admin</h2>
  <div id="loginBox">
    <input id="adminUser" placeholder="Username"><br>
    <input id="adminPass" type="password" placeholder="Password"><br>
    <button onclick="adminLogin()">Login</button>
  </div>

  <div id="adminPanel" class="hidden">
    <h3>Add Product</h3>
    <input id="pname" placeholder="Product name">
    <input id="pprice" placeholder="Price">
    <button onclick="addProduct()">Add</button>

    <h3>Orders</h3>
    <ul id="orders"></ul>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
  {name:'Nesquik', price:5},
  {name:'Biscuits', price:3}
];

let cart = [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];

function save(){
  localStorage.setItem('products', JSON.stringify(products));
  localStorage.setItem('orders', JSON.stringify(orders));
}

function showProducts(){
  let div = document.getElementById('productList');
  div.innerHTML='';
  products.forEach(p=>{
    div.innerHTML += `<div class='product'>
      <p>${p.name} - $${p.price}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
    </div>`;
  });
}

function addToCart(name,price){
  cart.push({name,price});
  showCart();
}

function showCart(){
  let div=document.getElementById('cartList');
  div.innerHTML='';
  cart.forEach(c=>{
    div.innerHTML += `<p>${c.name} - $${c.price}</p>`;
  });
}

function checkout(){
  let name=prompt('Magacaaga');
  let phone=prompt('Lambarkaaga');
  let address=prompt('Address');

  cart.forEach(c=>{
    orders.push({product:c.name,price:c.price,name,phone,address});
  });

  save();
  showOrders();

  let msg = `Dalab:%0A${cart.map(c=>c.name).join(', ')}%0AMagac:${name}%0A${phone}%0A${address}`;

  window.open(`https://wa.me/251933572122?text=${msg}`);
  window.open(`https://wa.me/252636896908?text=${msg}`);

  alert('Dalabka waa la diray. Fadlan lacag ku dir Zaad: +252636896908');
  cart=[];
  showCart();
}

function showOrders(){
  let list=document.getElementById('orders');
  if(!list) return;
  list.innerHTML='';
  orders.forEach(o=>{
    let li=document.createElement('li');
    li.textContent=o.product+' - $'+o.price+' - '+o.name;
    list.appendChild(li);
  });
}

function adminLogin(){
  if(adminUser.value==='admin' && adminPass.value==='1234'){
    loginBox.style.display='none';
    adminPanel.classList.remove('hidden');
    showOrders();
  } else alert('Wrong');
}

function addProduct(){
  products.push({name:pname.value, price:Number(pprice.value)});
  save();
  showProducts();
}

showProducts();
</script>

</body>
</html>
